# Automated first-principles code review on every PR. Posts an APPROVE /
# REQUEST CHANGES comment. Ran on this project's own PRs during development.
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            # First Principles PR Review

            Analyze this Pull Request for code quality, implementation elegance,
            and design decisions.

            1. Extract the PR goal from its title, description, and diff.
            2. First-principles analysis: does the solution solve the problem in
               the most straightforward way? Does it follow DRY, SOLID, KISS?
               Is it maintainable and free of unnecessary complexity?
            3. Implementation review: readability, simplicity, best practices,
               architecture, and whether a cleaner approach exists.
            4. Decide APPROVE (clean and elegant) or REQUEST CHANGES (a simpler
               or cleaner approach would better achieve the goal).

            Guidelines: focus on substantial improvements over nitpicking, honor
            the style preferences in CLAUDE.md, and give specific examples when
            requesting changes. Simple and clean beats clever and complex.

            Use `gh pr comment` (Bash) to post the review, clearly stating
            APPROVE or REQUEST CHANGES with justification.
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
