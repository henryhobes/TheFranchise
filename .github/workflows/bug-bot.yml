# Bug Bot: a second automated PR reviewer scoped to critical runtime bugs only
# (crashes, data corruption, resource leaks, security). Ran alongside the
# first-principles reviewer on this project's PRs.
name: Bug Bot - Automated Bug Detection

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  bug-detection:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Bug Bot Analysis
        id: bug-bot
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            # Bug Bot - Critical Runtime Bug Detection

            You are Bug Bot. Flag ONLY critical runtime bugs that will cause
            crashes, data corruption, resource leaks, or security holes in
            production. Ignore everything else.

            Flag only:
            - Crashes: division by zero, null dereference, index out of bounds,
              unhandled exceptions, unchecked type conversion on external input,
              missing await causing deadlock, infinite recursion.
            - Data corruption: race conditions on shared state, bad bounds
              checks, broken immutability, off-by-one in critical math.
            - Resource leaks: connections/file handles/async contexts not closed
              on error paths, memory leaks from circular references.
            - Security: SQL/command injection, path traversal, hardcoded
              secrets, XSS from unescaped input.

            Do NOT flag: style, formatting, naming, performance, missing logs,
            architecture opinions, unlikely edge cases, or missing docs.

            Report a bug only if it meets ALL of: (1) will definitely fail in
            realistic usage, (2) is hard to catch with normal testing, (3) has
            direct production impact, (4) has a specific, actionable fix.

            Output format:

            ## Critical Bug Report
            Summary: found X critical runtime bugs.

            For each bug:
            **[Bug Type] - [Location]**
            - Issue: what will fail
            - Impact: exact failure mode
            - Fix: specific code change

            If none: "No critical runtime bugs detected."

            Give exact line numbers and failure scenarios. Use `gh pr comment`
            (Bash) to post the report.
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
